<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>cdirect Player</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="stage">
        <video id="video" controls muted playsinline></video>
      </section>

      <aside class="panel" aria-label="Stream controls">
        <header class="brand">
          <div>
            <h1>cdirect Player</h1>
            <p id="status">Idle</p>
          </div>
          <span id="mode" class="pill">MSE</span>
        </header>

        <form id="connect-form" class="form">
          <label>
            Manifest URL
            <input
              id="manifest-url"
              name="manifestUrl"
              type="text"
              placeholder="chunks/manifest.mpd or https://bucket.s3.region.amazonaws.com/events/demo/manifest.mpd"
              autocomplete="off"
            />
          </label>

          <label>
            Object Base URL
            <input
              id="segment-base-url"
              name="segmentBaseUrl"
              type="text"
              placeholder="Optional; defaults to the manifest directory"
              autocomplete="off"
            />
          </label>

          <div class="toolbar">
            <button type="submit" id="connect-button">Connect</button>
            <button type="button" id="local-button">Local chunks</button>
            <button type="button" id="live-button">Go Live</button>
          </div>
        </form>

        <div class="metrics" aria-label="Stream metrics">
          <div>
            <span>Latency</span>
            <strong id="latency">-</strong>
          </div>
          <div>
            <span>Buffered</span>
            <strong id="buffered">0s</strong>
          </div>
          <div>
            <span>Updated</span>
            <strong id="updated-at">-</strong>
          </div>
        </div>

        <pre id="log" aria-label="Player log"></pre>
      </aside>
    </main>

    <script src="/vendor/dash.all.min.js"></script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
